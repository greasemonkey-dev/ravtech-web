<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ravtech</title>
    <script>
      // Single Page App redirect trick for GitHub Pages + BrowserRouter
      // When GitHub Pages 404s on a deep path, encode it into a query param
      // and redirect to index.html, which decodes it back into history.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
